<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Yun Quote App</title>
</head>

<body>
<h2>📖 Yun Quote App</h2>

<textarea id="korean" placeholder="한국어"></textarea><br>
<textarea id="english" placeholder="영어"></textarea><br>
<button onclick="addQuote()">저장</button>
<button onclick="loadQuotes()">불러오기</button>

<div id="list"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCLGqfm649Cl1AJfNcrjZd6zcpiTxOugbs",
  authDomain: "quote-app-77498.firebaseapp.com",
  projectId: "quote-app-77498",
  storageBucket: "quote-app-77498.firebasestorage.app",
  messagingSenderId: "856472751553",
  appId: "1:856472751553:web:5df8880a34739603d4b340"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addQuote = async function() {
  const k = document.getElementById("korean").value;
  const e = document.getElementById("english").value;

  if (!k) return;

  await addDoc(collection(db, "quotes"), {
    korean: k,
    english: e
  });

  alert("저장 완료!");
};

window.loadQuotes = async function() {
  const querySnapshot = await getDocs(collection(db, "quotes"));
  const list = document.getElementById("list");
  list.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    list.innerHTML += `<p><b>${data.korean}</b><br>${data.english || ""}</p>`;
  });
};
</script>

</body>
</html>
